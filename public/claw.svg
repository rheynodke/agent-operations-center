<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="4" y="4" width="112" height="112" rx="26" fill="#1a0a2e"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#bgGrad)" opacity="0.7"/>
  <!-- Glow -->
  <circle cx="60" cy="60" r="26" fill="url(#glowGrad)" opacity="0.5"/>
  <!-- Lines -->
  <line x1="60" y1="60" x2="92" y2="60"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="60" x2="76" y2="88"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="60" x2="44" y2="88"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="60" x2="28" y2="60"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="60" x2="44" y2="32"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="60" x2="76" y2="32"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Outer nodes -->
  <circle cx="92" cy="60" r="8" fill="#8b5cf6"/>
  <circle cx="76" cy="88" r="8" fill="#8b5cf6"/>
  <circle cx="44" cy="88" r="8" fill="#8b5cf6"/>
  <circle cx="28" cy="60" r="8" fill="#8b5cf6"/>
  <circle cx="44" cy="32" r="8" fill="#8b5cf6"/>
  <circle cx="76" cy="32" r="8" fill="#8b5cf6"/>
  <!-- Center hub -->
  <circle cx="60" cy="60" r="13" fill="#a78bfa"/>
  <circle cx="60" cy="60" r="5"  fill="#ede9fe" opacity="0.5"/>
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
